version: '3.9'

services:
  mongodb:
    image: mongo:6.0
    container_name: test-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: testuser
      MONGO_INITDB_ROOT_PASSWORD: testpassword
      MONGO_INITDB_DATABASE: testdb
    volumes:
      - mongo-data:/data/db
    networks:
      - test-network

volumes:
  mongo-data:

networks:
  test-network: